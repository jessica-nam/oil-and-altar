<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#060505" />
  <meta name="description" content="Oil &amp; Altar — photography" />
  <title>Oil &amp; Altar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Six+Caps&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body id="top">
  <!-- ambient layers -->
  <div class="cursor-glow" id="cursor-glow" aria-hidden="true"></div>
  <canvas id="grain" aria-hidden="true"></canvas>
  <div id="flash" aria-hidden="true"></div>
  <div id="veil" aria-hidden="true"></div>

  <header class="site-head mono">
    <a class="wordmark" href="#top">OIL&amp;ALTAR</a>
    <nav>
      <a href="#index">INDEX</a>
      <a href="#reels">REELS</a>
      <a href="#contact">CONTACT</a>
    </nav>
  </header>

  <main>
    <!-- ======================= HERO ======================= -->
    <section class="hero" id="hero">
      <div class="hero-sky" aria-hidden="true">
        <div class="hero-lamp" id="hero-lamp"></div>
        <div class="hero-horizon"></div>
      </div>
      <h1 class="hero-title" id="hero-title">
        <span class="line">OIL</span>
        <span class="line amp">&amp;</span>
        <span class="line">ALTAR</span>
      </h1>
      <div class="hero-foot mono" aria-hidden="true">
        <span>35MM</span>
        <span class="crosses">&#8224; &#8224; &#8224;</span>
        <span class="scroll-cue">SCROLL</span>
      </div>
    </section>

    <div class="marquee" aria-hidden="true"><div class="marquee-track"></div></div>

    <!-- ======================= GALLERY ======================= -->
    <section class="series-wrap" id="index"><!-- built by app.js --></section>

    <div class="marquee" aria-hidden="true"><div class="marquee-track"></div></div>

    <!-- ======================= REELS ======================= -->
    <section class="reels" id="reels">
      <header class="sec-head">
        <span class="mono sec-num">PROJECTION</span>
        <h2 class="flap" data-text="REELS">REELS</h2>
      </header>
      <div class="bays" id="bays"><!-- built by app.js --></div>
    </section>

    <!-- ======================= CONTACT ======================= -->
    <section class="contact" id="contact">
      <header class="sec-head">
        <span class="mono sec-num">&#8224;</span>
        <h2 class="flap" data-text="INQUIRE">INQUIRE</h2>
      </header>
      <form id="inquiry-form" class="mono" novalidate>
        <label>
          <span>NAME</span>
          <input name="name" type="text" required maxlength="200" autocomplete="name" />
        </label>
        <label>
          <span>EMAIL</span>
          <input name="email" type="email" required autocomplete="email" />
        </label>
        <label>
          <span>MESSAGE</span>
          <textarea name="message" rows="5" required maxlength="5000"></textarea>
        </label>
        <button type="submit">SEND</button>
        <p id="form-status" role="status"></p>
      </form>
    </section>
  </main>

  <footer class="mono">
    <a href="https://www.instagram.com/oilandaltar/" rel="noopener" target="_blank">@OILANDALTAR</a>
    <span aria-hidden="true">&#8224;</span>
  </footer>

  <!-- ======================= LIGHTBOX ======================= -->
  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button class="lb-btn lb-close" aria-label="Close">&times;</button>
    <button class="lb-btn lb-prev" aria-label="Previous">&#8249;</button>
    <button class="lb-btn lb-next" aria-label="Next">&#8250;</button>
    <div class="lb-stage" id="lb-stage"></div>
    <span class="lb-counter mono" id="lb-counter"></span>
  </div>

  <script src="app.js"></script>
</body>
</html>
